<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой первый сайт</title>
  <style>
    /* Фон и шрифт всей страницы */
    body {
      background-color: #f0f4f8;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Карточка по центру — белый блок с тенью и отступами */
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
    }

    /* Заголовок — крупный, тёмный, без лишних отступов сверху */
    h1 {
      color: #1a202c;
      font-size: 2rem;
      margin-top: 0;
    }

    /* Абзац — серый цвет, чуть меньше размер для контраста с h1 */
    p {
      color: #4a5568;
      font-size: 1rem;
      line-height: 1.6;
    }

    /* Кнопка — яркий фон, скруглённые углы, плавная анимация при наведении */
    button {
      background-color: #4f46e5;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      margin-top: 8px;
    }

    button:hover {
      background-color: #4338ca;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Мой первый сайт</h1>
    <p>Добро пожаловать на мой первый сайт! Здесь будет интересный контент.</p>
    <button onclick="document.querySelector('h1').textContent = 'Я меняю страницу кодом!'">Нажми меня</button>
  </div>
</body>
</html>
